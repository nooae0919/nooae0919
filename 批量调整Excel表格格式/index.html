.column_dimensions[&#x27;D&#x27;].width = 25</span><br><span class="line"></span><br><span class="line">    sheet[&#x27;A1&#x27;].font=openpyxl.styles.Font(name=&#x27;宋体&#x27;,size=20,bold=True)</span><br><span class="line">    sheet[&#x27;G1&#x27;].font=openpyxl.styles.Font(name=&#x27;宋体&#x27;,size=12,bold=True)</span><br><span class="line">    sheet[&#x27;G2&#x27;].font=openpyxl.styles.Font(name=&#x27;宋体&#x27;,size=12,bold=True)</span><br><span class="line"></span><br><span class="line">    wb.save(file_name)</span><br><span class="line"></span><br><span class="line">def excel_file():</span><br><span class="line">    path = os.getcwd()</span><br><span class="line">    files = os.listdir(path)</span><br><span class="line">    excelfiles = [f for f in files if not f.startswith((&quot;~$&quot;)) and f.endswith((&quot;.xlsx&quot;))]</span><br><span class="line">    for file in excelfiles:</span><br><span class="line">        fullpath = os.path.join(path,file)</span><br><span class="line">        excel_col(fullpath)</span><br><span class="line">        print(fullpath + &quot;格式调整完成&quot;)</span><br><span class="line"></span><br><span class="line">excel_file()</span><br></pre></td></tr></table></figure>
