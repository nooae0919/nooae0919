    <figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br></pre></td><td class="code"><pre><span class="line">import os</span><br><span class="line">import pandas as pd</span><br><span class="line">from selenium import webdriver</span><br><span class="line">from selenium.webdriver.common.by import By</span><br><span class="line">from selenium.webdriver.common.keys import Keys</span><br><span class="line">from selenium.webdriver.support.ui import WebDriverWait</span><br><span class="line">from selenium.webdriver.support import expected_conditions as EC</span><br><span class="line"></span><br><span class="line">user = input(&quot;请输入用户名：&quot;)</span><br><span class="line">psw = input(&quot;请输入密码：&quot;)</span><br><span class="line"># 进入登陆界面</span><br><span class="line">driver = webdriver.Edge()</span><br><span class="line">mes =  &#x27;MES网址&#x27;</span><br><span class="line">driver.get(mes)</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.ID, &quot;userDto_loginName&quot;)))</span><br><span class="line"></span><br><span class="line"># 输入用户名</span><br><span class="line">driver.find_element(By.ID,&quot;userDto_loginName&quot;).send_keys(user)</span><br><span class="line"></span><br><span class="line"># 输入密码</span><br><span class="line">driver.find_element(By.ID,&quot;keeper&quot;).send_keys(psw)</span><br><span class="line"></span><br><span class="line"># 选择账套 - 添加等待确保下拉框加载</span><br><span class="line">driver.find_element(By.ID, &#x27;mcDataAuthB&#x27;).click()</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.XPATH, &quot;//div[text()=&#x27;海微智造技术（武汉）有限公司&#x27;]&quot;)))</span><br><span class="line">option = driver.find_element(By.XPATH, &quot;//div[text()=&#x27;海微智造技术（武汉）有限公司&#x27;]&quot;)</span><br><span class="line">option.click()</span><br><span class="line"></span><br><span class="line"># 点击登陆按钮</span><br><span class="line">driver.find_element(By.ID, &quot;loginButton&quot;).click()</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.XPATH, &quot;//p[text()=&#x27;配置中心&#x27;]&quot;)))</span><br><span class="line"></span><br><span class="line"># 点击配置中心</span><br><span class="line">driver.find_element(By.XPATH, &quot;//p[text()=&#x27;配置中心&#x27;]&quot;).click()</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.XPATH, &quot;//a[contains(text(), &#x27;PC端数据采集&#x27;)]&quot;)))</span><br><span class="line"></span><br><span class="line"># 点击PC端数据采集</span><br><span class="line">driver.find_element(By.XPATH, &quot;//a[contains(text(), &#x27;PC端数据采集&#x27;)]&quot;).click()</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.XPATH, &quot;//a[text()=&#x27;数据采集&#x27;]&quot;)))</span><br><span class="line"></span><br><span class="line"># 使用JavaScript点击数据采集链接</span><br><span class="line">data_collection_link = driver.find_element(By.XPATH, &quot;//a[text()=&#x27;数据采集&#x27;]&quot;)</span><br><span class="line">driver.execute_script(&quot;arguments[0].click();&quot;, data_collection_link)</span><br><span class="line"></span><br><span class="line"># 进入数据采集框架</span><br><span class="line">WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.ID, &quot;iframe3&quot;)))</span><br><span class="line">iframe = driver.find_element(By.ID, &quot;iframe3&quot;)</span><br><span class="line">driver.switch_to.frame(iframe)</span><br><span class="line"></span><br><span class="line">input(&quot;请设置指令相关信息，按Enter键继续\n&quot;)</span><br><span class="line"></span><br><span class="line"># 查找当前文件夹.xlsx文件</span><br><span class="line">path = os.getcwd()</span><br><span class="line">files = os.listdir(path)</span><br><span class="line">excelfiles = [f for f in files if not f.startswith((&quot;~$&quot;)) and f.endswith((&quot;.xlsx&quot;))]</span><br><span class="line"></span><br><span class="line"># 打开.xlsx文件默认sheet</span><br><span class="line">wb = pd.read_excel(excelfiles[0])</span><br><span class="line"></span><br><span class="line"># 定义查找函数</span><br><span class="line">def mes_click(sn):</span><br><span class="line">    v = driver.find_element(By.XPATH, &quot;//input[@id=&#x27;input_box&#x27;]&quot;)</span><br><span class="line">    v.clear()</span><br><span class="line">    v.send_keys(sn)</span><br><span class="line">    v.send_keys(Keys.RETURN)</span><br><span class="line">    print(f&#x27;&#123;xh&#125;、&#123;sn&#125;已录入&#x27;)</span><br><span class="line"></span><br><span class="line"># 循环录入信息</span><br><span class="line">for index,row in wb.iterrows():</span><br><span class="line">    xh = row[&quot;序号&quot;]</span><br><span class="line">    sn = row[&quot;物料SN&quot;]</span><br><span class="line">    mes_click(sn)</span><br><span class="line">    WebDriverWait(driver, 10).until(EC.presence_of_element_located((By.XPATH, &quot;//input[@id=&#x27;input_box&#x27;]&quot;)))</span><br></pre></td></tr></table></figure>
