        <div class="post-content">
            <p>输入库位编码及名称，自动生成二维码</p>
<span id="more"></span>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br></pre></td><td class="code"><pre><span class="line">import qrcode</span><br><span class="line">from PIL import Image, ImageDraw, ImageFont</span><br><span class="line">import os</span><br><span class="line"></span><br><span class="line"># 输入库位编码和名称</span><br><span class="line">qr_text = input(&quot;输入库位编码：&quot;)</span><br><span class="line">qr_name = input(&quot;输入库位名称：&quot;)</span><br><span class="line"></span><br><span class="line"># 检查输入是否为空</span><br><span class="line">if not qr_text or not qr_name:</span><br><span class="line">    print(&quot;库位编码和名称不能为空！&quot;)</span><br><span class="line">    exit()</span><br><span class="line"></span><br><span class="line"># 生成二维码</span><br><span class="line">qr = qrcode.QRCode(</span><br><span class="line">    version=1,</span><br><span class="line">    error_correction=qrcode.constants.ERROR_CORRECT_L,</span><br><span class="line">    box_size=30,</span><br><span class="line">    border=4,</span><br><span class="line">)</span><br><span class="line">qr.add_data(qr_text)</span><br><span class="line">qr.make(fit=True)</span><br><span class="line"></span><br><span class="line">img = qr.make_image(fill=&#x27;black&#x27;, back_color=&#x27;white&#x27;)</span><br><span class="line"></span><br><span class="line"># 加载字体（使用系统默认字体或指定字体路径）</span><br><span class="line">try:</span><br><span class="line">    font_path = &quot;arial.ttf&quot;  # 可以替换为字体文件的完整路径</span><br><span class="line">    font = ImageFont.truetype(font_path, 80)</span><br><span class="line">except IOError:</span><br><span class="line">    print(&quot;字体文件未找到，使用默认字体。&quot;)</span><br><span class="line">    font = ImageFont.load_default()</span><br><span class="line"></span><br><span class="line"># 创建可以在图片上绘图的对象</span><br><span class="line">draw = ImageDraw.Draw(img)</span><br><span class="line"></span><br><span class="line"># 计算文本位置（居中）</span><br><span class="line"># 使用 getbbox 获取文本的边界框</span><br><span class="line">text_bbox = font.getbbox(qr_name)</span><br><span class="line">text_width = text_bbox[2] - text_bbox[0]  # 右边界 - 左边界</span><br><span class="line">text_height = text_bbox[3] - text_bbox[1]  # 下边界 - 上边界</span><br><span class="line"></span><br><span class="line">img_width, img_height = img.size</span><br><span class="line">text_x = (img_width - text_width) // 2</span><br><span class="line">text_y = 20  # 距离顶部的距离</span><br><span class="line"></span><br><span class="line"># 绘制文本</span><br><span class="line">draw.text((text_x, text_y), qr_name, font=font, fill=&#x27;black&#x27;)</span><br><span class="line"></span><br><span class="line"># 保存图片</span><br><span class="line">output_filename = f&quot;&#123;qr_name&#125;.png&quot;</span><br><span class="line">img.save(output_filename)</span><br><span class="line">print(f&quot;二维码已保存为 &#123;output_filename&#125;&quot;)</span><br></pre></td></tr></table></figure>
