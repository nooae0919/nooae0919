gePath)  # 若图片文件夹不存在就创建</span><br><span class="line"></span><br><span class="line">		pix.writePNG(imagePath + &#x27;/&#x27; + &#x27;images_%s.png&#x27; % pg)  # 将图片写入指定的文件夹内</span><br><span class="line"></span><br><span class="line">if __name__ == &quot;__main__&quot;:</span><br><span class="line">	pdfPath = &#x27;123.pdf&#x27;</span><br><span class="line">	imagePath = &#x27;./imgs&#x27;</span><br><span class="line">	pyMuPDF_fitz(pdfPath, imagePath)</span><br></pre></td></tr></table></figure>
